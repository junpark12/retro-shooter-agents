name: Build & Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 via vcpkg
        run: |
          vcpkg install sdl2:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build -S game `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item build\Release\GalaxyStorm.exe release\
          # Copy SDL2.dll from vcpkg installed bin
          $sdl2dll = Get-ChildItem "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\SDL2.dll" -ErrorAction SilentlyContinue
          if ($sdl2dll) { Copy-Item $sdl2dll.FullName release\ }
          # Also try build output directory
          $buildDll = Get-ChildItem build\Release\SDL2.dll -ErrorAction SilentlyContinue
          if ($buildDll) { Copy-Item $buildDll.FullName release\ -Force }
          Compress-Archive -Path release\* -DestinationPath GalaxyStorm-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyStorm-windows-x64
          path: GalaxyStorm-windows-x64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GalaxyStorm-windows-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: GalaxyStorm-windows-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
