name: Build & Release (Windows)

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-windows:
    runs-on: windows-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 + extensions via vcpkg
        run: |
          vcpkg install sdl2:x64-windows sdl2-image:x64-windows sdl2-mixer:x64-windows sdl2-ttf:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build -S game `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item build\Release\GalaxyStorm.exe release\
          # Copy all DLLs from vcpkg
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          $dlls = @("SDL2.dll", "SDL2_image.dll", "SDL2_mixer.dll", "SDL2_ttf.dll",
                    "libpng16.dll", "zlib1.dll", "libjpeg-62.dll", "libwebp-7.dll",
                    "libtiff-6.dll", "libmpg123-0.dll", "libFLAC.dll", "libvorbis-0.dll",
                    "libvorbisfile-3.dll", "libogg-0.dll", "freetype.dll", "brotlidec.dll",
                    "brotlicommon.dll", "bz2.dll", "libsharpyuv.dll")
          foreach ($dll in $dlls) {
            $src = Join-Path $vcpkgBin $dll
            if (Test-Path $src) { Copy-Item $src release\ }
          }
          # Also copy from build output
          Get-ChildItem build\Release\*.dll -ErrorAction SilentlyContinue | Copy-Item -Destination release\ -Force
          # Copy assets directory
          if (Test-Path game\assets) {
            Copy-Item -Recurse game\assets release\assets
          }
          Compress-Archive -Path release\* -DestinationPath GalaxyStorm-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyStorm-windows-x64
          path: GalaxyStorm-windows-x64.zip

      - name: Create Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GalaxyStorm-windows-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: GalaxyStorm-windows-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-tag and Release (PR merge or push to main)
        if: >-
          (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
          (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        shell: bash
        run: |
          # Generate auto-increment tag based on date + run number
          TAG="v0.$(date +%Y%m%d).${{ github.run_number }}"
          echo "Auto-tagging as $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (auto)
        if: >-
          (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
          (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.${{ github.run_number }}
          files: GalaxyStorm-windows-x64.zip
          generate_release_notes: true
          name: "Galaxy Storm Build #${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
