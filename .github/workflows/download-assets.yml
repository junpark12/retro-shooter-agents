name: Download Game Assets

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'game/assets/asset-request.json'

jobs:
  download-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read asset-request.json
        id: request
        run: |
          if [ ! -f game/assets/asset-request.json ]; then
            echo "No asset-request.json found"
            exit 1
          fi
          cat game/assets/asset-request.json
          echo "requests=$(cat game/assets/asset-request.json | jq -c '.')" >> $GITHUB_OUTPUT

      - name: Download assets
        run: |
          REQUESTS='${{ steps.request.outputs.requests }}'

          echo "$REQUESTS" | jq -c '.assets[]' | while read -r item; do
            CATEGORY=$(echo "$item" | jq -r '.category')
            URLS=$(echo "$item" | jq -r '.urls[]')
            LICENSE=$(echo "$item" | jq -r '.license // "unknown"')
            SOURCE=$(echo "$item" | jq -r '.source // "unknown"')

            TARGET_DIR="game/assets/$CATEGORY"
            mkdir -p "$TARGET_DIR"

            for url in $URLS; do
              FILENAME=$(basename "$url" | sed 's/[?#].*//')
              echo "Downloading: $url -> $TARGET_DIR/$FILENAME"

              if curl -fL --max-time 120 -o "/tmp/$FILENAME" "$url"; then
                if [[ "$FILENAME" == *.zip ]]; then
                  EXTRACT_DIR="/tmp/extracted_$(basename $FILENAME .zip)"
                  mkdir -p "$EXTRACT_DIR"
                  unzip -o "/tmp/$FILENAME" -d "$EXTRACT_DIR"
                  find "$EXTRACT_DIR" \( -name "*.png" -o -name "*.ogg" -o -name "*.wav" -o -name "*.ttf" -o -name "*.mp3" \) \
                    -exec cp {} "$TARGET_DIR/" \;
                  echo "✅ $FILENAME (extracted to $TARGET_DIR)"
                else
                  cp "/tmp/$FILENAME" "$TARGET_DIR/"
                  echo "✅ $FILENAME"
                fi
              else
                echo "❌ $FILENAME (download failed)"
              fi
            done
          done

      - name: Update asset history
        run: |
          HISTORY_FILE="game/assets/asset-history.json"
          REQUEST_FILE="game/assets/asset-request.json"

          # Initialize history file if it doesn't exist
          if [ ! -f "$HISTORY_FILE" ]; then
            echo '{"downloaded":[]}' > "$HISTORY_FILE"
          fi

          # Append each asset entry from request to history
          TODAY=$(date -u +%Y-%m-%d)
          REQUESTS='${{ steps.request.outputs.requests }}'

          echo "$REQUESTS" | jq -c '.assets[]' | while read -r item; do
            CATEGORY=$(echo "$item" | jq -r '.category')
            URLS=$(echo "$item" | jq -c '.urls')
            LICENSE=$(echo "$item" | jq -r '.license // "unknown"')
            SOURCE=$(echo "$item" | jq -r '.source // "unknown"')

            # Check if any URL already exists in history to avoid duplicates
            DOMINATED=false
            for url in $(echo "$URLS" | jq -r '.[]'); do
              if jq -e --arg u "$url" '.downloaded[] | select(.urls[] == $u)' "$HISTORY_FILE" > /dev/null 2>&1; then
                DOMINATED=true
                break
              fi
            done

            if [ "$DOMINATED" = false ]; then
              # Append new entry to history
              jq --argjson urls "$URLS" \
                 --arg cat "$CATEGORY" \
                 --arg lic "$LICENSE" \
                 --arg src "$SOURCE" \
                 --arg date "$TODAY" \
                 '.downloaded += [{"category": $cat, "urls": $urls, "source": $src, "license": $lic, "date": $date}]' \
                 "$HISTORY_FILE" > "${HISTORY_FILE}.tmp" && mv "${HISTORY_FILE}.tmp" "$HISTORY_FILE"
              echo "📝 Added to history: $SOURCE ($CATEGORY)"
            else
              echo "⏭️ Already in history: $SOURCE ($CATEGORY)"
            fi
          done

      - name: Commit downloaded assets to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove the request file after processing
          rm -f game/assets/asset-request.json
          git add --all game/assets/

          if git diff --cached --quiet; then
            echo "No new assets to commit"
          else
            git commit -m "chore: download assets from asset-request.json

            Processed by Download Game Assets workflow.
            [skip-release]"
            git push
          fi
